name: Build Binary

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest # Windows用なら windows-latest に変更
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Nuitka
        run: pip install nuitka

      - name: Build with Nuitka (Standalone & Onefile)
        run: |
          python -m nuitka --onefile --standalone --remove-output main.py
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-binary
          path: main.bin # Windowsなら main.exe
